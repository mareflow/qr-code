<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MareFlow - Historico do Veiculo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <main class="max-w-3xl mx-auto p-4 py-8">
        <section id="loading" class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
            Carregando historico do veiculo...
        </section>

        <section id="error-section" class="hidden bg-white rounded-lg shadow p-6 text-center">
            <h1 class="text-xl font-bold text-red-600 mb-2">Historico nao encontrado</h1>
            <p id="error-message" class="text-gray-600">Confira o QR Code ou solicite um novo link para a oficina.</p>
        </section>

        <section id="os-section" class="hidden bg-white rounded-lg shadow overflow-hidden">
            <header class="bg-blue-900 text-white p-6">
                <div class="flex items-center gap-4">
                    <div id="workshop-logo" class="hidden w-16 h-16 bg-white rounded overflow-hidden flex-shrink-0"></div>
                    <div>
                        <p class="text-sm text-blue-100">Historico do Veiculo</p>
                        <h1 id="workshop-name" class="text-2xl font-bold">MareFlow</h1>
                    </div>
                </div>
            </header>

            <div class="p-6 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <p class="text-xs uppercase text-gray-400 font-semibold">Ultimo cliente informado</p>
                        <p id="customer-name" class="text-gray-900 font-semibold"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase text-gray-400 font-semibold">Placa</p>
                        <p id="plate" class="text-gray-900 font-semibold"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase text-gray-400 font-semibold">Ultimo atendimento</p>
                        <p id="os-date" class="text-gray-900 font-semibold"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase text-gray-400 font-semibold">Ultima quilometragem</p>
                        <p id="mileage" class="text-gray-900 font-semibold"></p>
                    </div>
                </div>

                <div class="border-t pt-5">
                    <h2 class="text-lg font-bold text-gray-900 mb-3">Servicos do veiculo</h2>
                    <div id="history-list" class="space-y-3"></div>
                </div>

                <div id="whatsapp-box" class="hidden border-t pt-5">
                    <a id="whatsapp-link" href="#" target="_blank" class="block text-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded">
                        Falar com a oficina
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/os.js"></script>
</body>
</html>
