<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f3f4f6">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Parceiros - Maré Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Custom map markers */
        .custom-div-icon {
            background: transparent;
            border: none;
        }
        .marker-pin {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid #1E3A8A;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.2s;
        }
        .marker-pin:hover {
            transform: scale(1.1);
            z-index: 1000 !important;
        }
        .marker-pin::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: #1E3A8A transparent transparent transparent;
        }
        .marker-logo {
            width: 38px;
            height: 38px;
            object-fit: contain;
            border-radius: 50%;
            background-color: white;
        }
        
        /* Custom Popup */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 0;
            overflow: hidden;
        }
        .leaflet-popup-content {
            margin: 0;
            width: 240px !important;
        }
        .leaflet-popup-tip {
            box-shadow: none;
        }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden relative">

    <!-- Header Overlay -->
    <div class="absolute top-0 left-0 w-full z-[1000] p-4 flex justify-between items-center pointer-events-none">
        <div class="flex gap-2">
            <a href="index.html" class="pointer-events-auto bg-white/90 backdrop-blur-md px-4 py-2.5 rounded-full shadow-lg text-gray-800 font-bold text-sm flex items-center gap-2 hover:bg-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Voltar
            </a>
            <a href="login-cliente.html" class="pointer-events-auto bg-blue-600/90 backdrop-blur-md px-4 py-2.5 rounded-full shadow-lg text-white font-bold text-sm flex items-center gap-2 hover:bg-blue-600 transition-all hidden sm:flex">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                Acesso Cliente
            </a>
        </div>
        
        <div class="pointer-events-auto bg-white/90 backdrop-blur-md px-5 py-2.5 rounded-full shadow-lg flex items-center gap-3">
            <img src="assets/logo.png" alt="Maré Flow" class="h-6">
            <span class="text-sm font-bold text-blue-900 border-l pl-3 border-gray-300">Oficinas Parceiras</span>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Loading Overlay -->
    <div id="loading" class="absolute inset-0 z-[2000] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-bold text-gray-800">Buscando parceiros...</h2>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="js/mapa.js?v=1"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
