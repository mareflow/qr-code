<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f9fafb">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maré Flow - Redefinir Senha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 relative">

    <div class="w-full max-w-md bg-white p-8 sm:p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 relative">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Redefinir Senha</h2>
            <p class="text-gray-500 font-medium text-sm sm:text-base">Quase lá! Escolha uma nova senha forte para sua conta.</p>
        </div>

        <div id="reset-message" class="hidden mb-6 p-3 rounded-xl text-sm font-semibold text-center border"></div>

        <form id="reset-form" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nova Senha</label>
                <input id="new-password" type="password" required minlength="6" class="block w-full border border-gray-200 rounded-xl px-4 py-3.5 bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-all font-medium" placeholder="Mínimo 6 caracteres">
            </div>

            <button id="btn-reset" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg shadow-blue-500/30 hover:shadow-blue-600/40 transition-all duration-300 transform hover:-translate-y-0.5">
                Salvar Nova Senha
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-gray-500 font-medium">
            <a href="index.html" class="text-blue-600 font-bold hover:underline mt-1 inline-block">Voltar para o Login</a>
        </p>
    </div>

    <footer class="absolute bottom-6 w-full text-center text-sm text-gray-400">
        Desenvolvido por <a href="https://wa.me/5548992233575?text=ol%C3%A1%20estava%20no%20aplicativo%20QR%20code%20e%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es" target="_blank" class="font-bold text-gray-500 hover:text-blue-600 transition-colors">Maré Flow</a>
    </footer>

    <script type="module" src="js/recuperar.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
